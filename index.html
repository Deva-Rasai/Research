<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORACLE — Working Version</title>
<style>
body{font-family:Arial;padding:40px;background:#f5f0e8}
input{padding:10px;width:300px}
button{padding:10px}
.result{margin-top:20px;padding:10px;background:white;border:1px solid #ccc}
</style>
</head>
<body>
<h1>ORACLE (Working)</h1>
<input id="q" placeholder="Search topic...">
<button onclick="search()">Search</button>
<div id="out"></div>

<script>
async function search(){
  const q = document.getElementById('q').value;
  const out = document.getElementById('out');
  out.innerHTML = 'Searching...';

  try{
    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://en.wikipedia.org/api/rest_v1/page/summary/'+q)}`);
    const data = await res.json();

    out.innerHTML = `
      <div class="result">
        <h2>${data.title}</h2>
        <p>${data.extract}</p>
      </div>
    `;
  }catch(e){
    out.innerHTML = 'Error fetching results';
  }
}
</script>
</body>
</html>
